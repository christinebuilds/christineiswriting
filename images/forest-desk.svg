<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" fill="none">
  <!-- Background gradient — warm cream to sage -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE7DD"/>
      <stop offset="60%" stop-color="#d4cfc5"/>
      <stop offset="100%" stop-color="#A8B89E"/>
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b5e4a"/>
      <stop offset="100%" stop-color="#93886D"/>
    </linearGradient>
  </defs>

  <!-- Sky / background -->
  <rect width="600" height="800" fill="url(#sky)"/>

  <!-- Distant mountains -->
  <path d="M0 480 L100 380 L200 430 L320 340 L420 400 L520 350 L600 410 L600 520 L0 520Z" fill="#A8B89E" opacity="0.4"/>
  <path d="M0 500 L150 420 L280 470 L400 390 L500 440 L600 400 L600 540 L0 540Z" fill="#7A8B6F" opacity="0.35"/>

  <!-- Ground -->
  <rect y="540" width="600" height="260" fill="#7A8B6F" opacity="0.25"/>

  <!-- Back trees — tall pines -->
  <!-- Tree 1 -->
  <polygon points="80,250 50,440 110,440" fill="#3D4F3D" opacity="0.6"/>
  <polygon points="80,290 58,400 102,400" fill="#3D4F3D" opacity="0.7"/>
  <rect x="75" y="440" width="10" height="40" fill="#6b5e4a" opacity="0.5"/>

  <!-- Tree 2 -->
  <polygon points="160,200 120,440 200,440" fill="#2A3A2A" opacity="0.5"/>
  <polygon points="160,250 130,390 190,390" fill="#3D4F3D" opacity="0.6"/>
  <rect x="155" y="440" width="10" height="50" fill="#6b5e4a" opacity="0.4"/>

  <!-- Tree 3 -->
  <polygon points="480,220 440,440 520,440" fill="#3D4F3D" opacity="0.55"/>
  <polygon points="480,270 450,400 510,400" fill="#2A3A2A" opacity="0.5"/>
  <rect x="475" y="440" width="10" height="45" fill="#6b5e4a" opacity="0.45"/>

  <!-- Tree 4 -->
  <polygon points="540,260 510,440 570,440" fill="#3D4F3D" opacity="0.6"/>
  <rect x="535" y="440" width="10" height="35" fill="#6b5e4a" opacity="0.5"/>

  <!-- Mid trees -->
  <!-- Tree 5 — larger -->
  <polygon points="50,300 10,520 90,520" fill="#3D4F3D" opacity="0.75"/>
  <polygon points="50,340 20,480 80,480" fill="#2A3A2A" opacity="0.6"/>
  <rect x="44" y="520" width="12" height="50" fill="url(#trunk)" opacity="0.7"/>

  <!-- Tree 6 -->
  <polygon points="550,280 510,520 590,520" fill="#3D4F3D" opacity="0.7"/>
  <polygon points="550,320 520,470 580,470" fill="#2A3A2A" opacity="0.55"/>
  <rect x="544" y="520" width="12" height="50" fill="url(#trunk)" opacity="0.65"/>

  <!-- Foreground — writing desk area -->
  <!-- Desk surface -->
  <rect x="150" y="600" width="300" height="12" rx="2" fill="#93886D"/>
  <!-- Desk legs -->
  <rect x="170" y="612" width="8" height="80" fill="#93886D" opacity="0.8"/>
  <rect x="422" y="612" width="8" height="80" fill="#93886D" opacity="0.8"/>
  <!-- Cross brace -->
  <line x1="178" y1="660" x2="430" y2="660" stroke="#93886D" stroke-width="3" opacity="0.5"/>

  <!-- Open notebook on desk -->
  <!-- Left page -->
  <rect x="230" y="570" width="60" height="28" rx="1" fill="#F5F1EB" transform="rotate(-2, 260, 584)"/>
  <!-- Right page -->
  <rect x="292" y="570" width="60" height="28" rx="1" fill="#F5F1EB" transform="rotate(1, 322, 584)"/>
  <!-- Spine -->
  <line x1="290" y1="569" x2="290" y2="598" stroke="#93886D" stroke-width="1.5" opacity="0.5"/>
  <!-- Writing lines -->
  <line x1="238" y1="578" x2="280" y2="577" stroke="#A8B89E" stroke-width="0.8" opacity="0.5"/>
  <line x1="238" y1="583" x2="275" y2="582" stroke="#A8B89E" stroke-width="0.8" opacity="0.5"/>
  <line x1="238" y1="588" x2="270" y2="587" stroke="#A8B89E" stroke-width="0.8" opacity="0.5"/>
  <line x1="300" y1="578" x2="342" y2="578" stroke="#A8B89E" stroke-width="0.8" opacity="0.5"/>
  <line x1="300" y1="583" x2="338" y2="583" stroke="#A8B89E" stroke-width="0.8" opacity="0.5"/>
  <line x1="300" y1="588" x2="330" y2="588" stroke="#A8B89E" stroke-width="0.8" opacity="0.5"/>

  <!-- Pen -->
  <line x1="355" y1="575" x2="375" y2="595" stroke="#3D4F3D" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="375" y1="595" x2="377" y2="598" stroke="#93886D" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Small plant on desk -->
  <rect x="390" y="585" width="16" height="14" rx="2" fill="#93886D" opacity="0.7"/>
  <!-- Leaves -->
  <ellipse cx="398" cy="578" rx="6" ry="10" fill="#7A8B6F" opacity="0.8" transform="rotate(-15, 398, 578)"/>
  <ellipse cx="394" cy="580" rx="5" ry="9" fill="#3D4F3D" opacity="0.7" transform="rotate(10, 394, 580)"/>
  <ellipse cx="402" cy="579" rx="5" ry="8" fill="#7A8B6F" opacity="0.6" transform="rotate(-25, 402, 579)"/>

  <!-- Coffee mug -->
  <rect x="195" y="580" width="18" height="18" rx="3" fill="#93886D" opacity="0.6"/>
  <path d="M213 586 Q222 586 222 592 Q222 598 213 598" stroke="#93886D" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Steam -->
  <path d="M200 578 Q202 572 204 575 Q206 570 208 574" stroke="#A8B89E" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Floating leaves / nature elements -->
  <ellipse cx="280" cy="460" rx="8" ry="4" fill="#7A8B6F" opacity="0.3" transform="rotate(30, 280, 460)"/>
  <ellipse cx="350" cy="490" rx="6" ry="3" fill="#A8B89E" opacity="0.25" transform="rotate(-20, 350, 490)"/>
  <ellipse cx="220" cy="510" rx="7" ry="3.5" fill="#3D4F3D" opacity="0.2" transform="rotate(45, 220, 510)"/>

  <!-- Subtle light rays from above -->
  <line x1="300" y1="0" x2="250" y2="540" stroke="#F5F1EB" stroke-width="30" opacity="0.06"/>
  <line x1="340" y1="0" x2="350" y2="540" stroke="#F5F1EB" stroke-width="20" opacity="0.05"/>
</svg>
